name: Build Military AI
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # استفاده از نسخه 3.10 برای پایداری بیشتر در تورچ
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 transformers feedparser beautifulsoup4 requests torch --index-url https://download.pytorch.org/whl/cpu
          pip install pyinstaller
          
      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "MilitaryAI" --hidden-import=pytorch main.py
        
      - name: Upload Artifact
        if: success() # فقط اگر مراحل قبل موفق بود آپلود کن
        uses: actions/upload-artifact@v4
        with:
          name: Final_App
          path: dist/MilitaryAI.exe
