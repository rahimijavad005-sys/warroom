name: Build Strategic AI EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 transformers feedparser beautifulsoup4 requests pyinstaller
          # نصب نسخه CPU تورچ برای بیلد (حجم کمتر و پایداری در گیت‌هاب)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          
      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "MilitaryAI" `
          --collect-all torch `
          --collect-all transformers `
          --collect-all tqdm `
          --hidden-import=pytorch `
          main.py
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StrategicAI_Final_Package
          path: dist/MilitaryAI.exe
