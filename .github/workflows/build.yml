name: Build Military AI Browser Engine

on:
  push:
    branches: [ "main" ] # یا هر شاخه‌ای که کدهایت روی آن است

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # سرعت بخشیدن به بیلد در دفعات بعد

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # نصب کتابخانه‌های اصلی
          pip install PyQt6 playwright transformers pyinstaller beautifulsoup4
          # نصب نسخه سبک تورچ برای جلوگیری از سنگین شدن بیش از حد بیلد
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # نصب و آماده‌سازی موتور مرورگر (حیاتی)
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "MilitaryAI_V3" `
          --collect-all playwright `
          --collect-all torch `
          --collect-all transformers `
          --hidden-import=playwright.driver `
          --hidden-import=pytorch `
          main.py

      - name: Upload Finished EXE
        uses: actions/upload-artifact@v4
        with:
          name: Strategic_AI_v3
          path: dist/MilitaryAI_V3.exe
